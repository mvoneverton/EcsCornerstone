<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1e3d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a961;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c9a961;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="centerGlow">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1e3d;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="250" cy="250" r="250" fill="url(#bgGrad)"/>
  <!-- Subtle inner glow -->
  <circle cx="250" cy="250" r="200" fill="url(#centerGlow)" opacity="0.3"/>
  <!-- Outer bold ring -->
  <circle cx="250" cy="250" r="232" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.95"/>
  <!-- Inner fine ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.7"/>
  <!-- ECS monogram — centered -->
  <text x="250" y="250" font-family="Georgia, serif" font-size="180" font-weight="300"
        fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="central" letter-spacing="10">ECS</text>
</svg>
